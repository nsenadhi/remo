<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REMONI - Virtual Nurse</title>

    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="chatbox">
            <div class="chatbox__support chatbox--active">
                <!-- Header -->
                <div class="chatbox__header">
                    <div class="chatbox__image--header">
                        <img src="https://img.icons8.com/color/48/000000/medical-doctor.png" alt="Nurse Icon">
                    </div>
                    <div class="chatbox__content--header">
                        <h4 class="chatbox__heading--header">REMONI - Virtual Nurse</h4>
                        <p class="chatbox__description--header">24/7 Health Monitoring Assistant</p>
                    </div>
                </div>

                <!-- Messages Container -->
                <div class="chatbox__messages">
                    <div></div>
                </div>

                <!-- Footer / Input Area -->
                <div class="chatbox__footer">
                    <input
                        type="text"
                        class="text_input"
                        placeholder="Type your message..."
                        autocomplete="off"
                    >
                    <button class="send__button">
                        <span>Send</span>
                        <svg class="chatbox__send--footer" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        var $SCRIPT_ROOT = {{ request.script_root|tojson|safe }};
    </script>
    <script src="{{ url_for('static', filename='doctor.js') }}"></script>
</body>
</html>
